<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire de Réservation</title>
</head>
<body>
    <h2>Formulaire de Réservation</h2>
    <form th:action="@{/reserver}" th:object="${reservation}" method="post">

        <label>Nom du demandeur :</label><br>
        <input type="text" th:field="*{nomDemandeur}" required /><br><br>

        <label>Type de réservation :</label><br>
        <select th:field="*{typeReservation}">
            <option value="Salle">Salle</option>
            <option value="Amphi">Amphi</option>
        </select><br><br>

        <label>Demi-journée :</label><br>
        <input type="radio" th:field="*{demiJournee}" value="Matin" /> Matin
        <input type="radio" th:field="*{demiJournee}" value="ApresMidi" /> Après-Midi<br><br>

        <label>Heure début :</label><br>
        <input type="number" th:field="*{heureDebut}" min="0" max="23" required /><br><br>

        <label>Heure fin :</label><br>
        <input type="number" th:field="*{heureFin}" min="0" max="23" required /><br><br>

        <button type="submit">Soumettre</button>
    </form>
</body>
</html>
